<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Nueva Venta — Tienda Útiles</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .search-sticky { position:sticky;top:var(--header-height);z-index:50;background:var(--gray-50);padding:10px 16px 6px;border-bottom:1px solid var(--gray-200); }
    .prod-item { display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--gray-100);background:var(--white);cursor:pointer;transition:background 0.1s; }
    .prod-item:active { background:var(--primary-light); }
    .prod-ico { width:40px;height:40px;border-radius:var(--radius-sm);background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0; }
    .prod-ico.agotado { background:var(--danger-light);color:var(--danger); }
    .prod-info { flex:1;min-width:0; }
    .prod-info-nombre { font-size:14px;font-weight:500;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .prod-info-stock { font-size:12px;color:var(--gray-400);margin-top:1px; }
    .prod-precio { font-size:15px;font-weight:700;color:var(--primary);flex-shrink:0; }

    .carrito-wrap { background:var(--white);border-top:1px solid var(--gray-200);padding:12px 16px;position:fixed;bottom:var(--nav-height);left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:90;max-height:55vh;display:flex;flex-direction:column; }
    .carrito-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer; }
    .carrito-titulo { font-size:13px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:6px; }
    .carrito-badge { background:var(--primary);color:var(--white);border-radius:var(--radius-full);font-size:10px;font-weight:700;padding:1px 7px; }
    .carrito-items { overflow-y:auto;flex:1; }
    .carrito-item { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100); }
    .carrito-nombre { flex:1;font-size:13px;font-weight:500;color:var(--gray-800); }
    .qty-ctrl { display:flex;align-items:center;gap:8px; }
    .qty-btn { width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gray-200);background:var(--gray-50);font-size:16px;color:var(--gray-700);display:flex;align-items:center;justify-content:center;cursor:pointer; }
    .qty-btn:active { background:var(--gray-200); }
    .qty-num { font-size:14px;font-weight:700;min-width:20px;text-align:center; }
    .item-subtotal { font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;min-width:52px;text-align:right; }
    .carrito-footer { padding-top:10px; }
    .total-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px; }
    .total-label { font-size:13px;color:var(--gray-600); }
    .total-valor { font-size:22px;font-weight:800;color:var(--gray-900); }
    .carrito-vacio { text-align:center;padding:12px;color:var(--gray-400);font-size:13px; }
    .page-content { padding-bottom:calc(var(--nav-height) + 220px);padding-top:0; }

    /* Tipo de pago */
    .pago-tabs { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px; }
    .pago-tab { padding:12px;border-radius:var(--radius-md);border:2px solid var(--gray-200);background:var(--white);text-align:center;cursor:pointer;transition:all 0.15s; }
    .pago-tab.active.efectivo { border-color:#059669;background:#d1fae5; }
    .pago-tab.active.yape { border-color:#7C3AED;background:#EDE9FE; }
    .pago-tab-icon { font-size:24px;margin-bottom:4px; }
    .pago-tab-label { font-size:13px;font-weight:600;color:var(--gray-700); }
    .pago-tab.active.efectivo .pago-tab-label { color:#065f46; }
    .pago-tab.active.yape .pago-tab-label { color:#5B21B6; }

    .modal-title { font-size:17px;font-weight:700;color:var(--gray-900);margin-bottom:4px; }
    .resumen-item { display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px; }
    .resumen-total { display:flex;justify-content:space-between;padding:12px 0 4px;font-size:16px;font-weight:700; }

    /* Boleta PDF preview */
    .boleta-preview { background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:20px;margin-bottom:14px;font-family:'Courier New',monospace; }
    .boleta-header { text-align:center;margin-bottom:12px; }
    .boleta-tienda { font-size:18px;font-weight:700;color:var(--gray-900);letter-spacing:1px; }
    .boleta-subtitulo { font-size:11px;color:var(--gray-500);margin-top:2px; }
    .boleta-sep { border:none;border-top:1px dashed var(--gray-300);margin:10px 0; }
    .boleta-meta { font-size:12px; }
    .boleta-meta-row { display:flex;justify-content:space-between;margin:3px 0;color:var(--gray-700); }
    .boleta-items { font-size:12px;margin:8px 0; }
    .boleta-item-row { display:flex;justify-content:space-between;margin:4px 0; }
    .boleta-item-det { font-size:11px;color:var(--gray-500);margin-left:4px; }
    .boleta-totales { font-size:12px; }
    .boleta-total-row { display:flex;justify-content:space-between;margin:3px 0; }
    .boleta-total-final { display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:6px;color:var(--gray-900); }
    .boleta-pago { text-align:center;margin-top:8px;font-size:12px; }
    .boleta-pago-badge { display:inline-block;padding:3px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600; }
    .boleta-pago-badge.efectivo { background:#d1fae5;color:#065f46; }
    .boleta-pago-badge.yape { background:#EDE9FE;color:#5B21B6; }
    .boleta-gracias { text-align:center;font-size:11px;color:var(--gray-400);margin-top:10px; }

    .btn-wsp { background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;margin-bottom:8px; }
    .btn-wsp:active { opacity:0.85; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="title">Nueva venta</div>
    <button class="icon-btn" onclick="window.location.href='dashboard.html'" aria-label="Volver">
      <i class="ti ti-x" aria-hidden="true"></i>
    </button>
  </header>

  <div class="search-sticky">
    <div class="search-bar" style="margin-bottom:0;">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="buscador" placeholder="Buscar producto..." autocomplete="off">
    </div>
  </div>

  <main class="page-content">
    <div id="listaProductos">
      <div style="text-align:center;padding:40px;"><div class="spinner"></div></div>
    </div>
  </main>

  <div class="carrito-wrap">
    <div class="carrito-header" onclick="toggleCarrito()">
      <div class="carrito-titulo">
        <i class="ti ti-shopping-cart" aria-hidden="true"></i>
        Carrito
        <span class="carrito-badge" id="carritoCount">0</span>
      </div>
      <i class="ti ti-chevron-up" id="carritoChevron" aria-hidden="true"></i>
    </div>
    <div id="carritoBody">
      <div class="carrito-items" id="carritoItems">
        <div class="carrito-vacio">Sin productos aún — toca uno para agregar</div>
      </div>
      <div class="carrito-footer" id="carritoFooter" style="display:none;">
        <div class="total-row">
          <span class="total-label">Total a cobrar</span>
          <span class="total-valor" id="totalMostrar">S/ 0.00</span>
        </div>
        <button class="btn btn-primary" onclick="abrirCobro()">
          <i class="ti ti-receipt" aria-hidden="true"></i> Cobrar y emitir boleta
        </button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="ti ti-home" aria-hidden="true"></i>Inicio</a>
    <a href="ventas.html" class="nav-item active"><i class="ti ti-shopping-cart" aria-hidden="true"></i>Venta</a>
    <a href="inventario.html" class="nav-item"><i class="ti ti-package" aria-hidden="true"></i>Inventario</a>
    <a href="cotizaciones.html" class="nav-item"><i class="ti ti-file-text" aria-hidden="true"></i>Cotizar</a>
  </nav>

  <!-- MODAL: Confirmar cobro -->
  <div class="modal-overlay hidden" id="modalCobro">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Confirmar cobro</div>
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:14px;">Revisa el resumen antes de cobrar</p>

      <div class="form-group">
        <label class="form-label">Tipo de pago</label>
        <div class="pago-tabs">
          <div class="pago-tab efectivo active" id="tabEfectivo" onclick="seleccionarPago('efectivo')">
            <div class="pago-tab-icon">💵</div>
            <div class="pago-tab-label">Efectivo</div>
          </div>
          <div class="pago-tab yape" id="tabYape" onclick="seleccionarPago('yape')">
            <div class="pago-tab-icon">📱</div>
            <div class="pago-tab-label">Yape</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="clienteNombre">Cliente (opcional)</label>
        <input class="form-input" type="text" id="clienteNombre" placeholder="Ej: Juan Pérez">
      </div>

      <div class="form-group">
        <label class="form-label" for="clienteTelefono">
          WhatsApp del cliente (opcional)
          <span style="font-size:10px;color:var(--gray-400);font-weight:400;"> — para enviar boleta</span>
        </label>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;color:var(--gray-500);font-weight:500;">+51</span>
          <input class="form-input" type="tel" id="clienteTelefono" placeholder="987654321" inputmode="numeric" maxlength="9">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="descuento">Descuento (S/)</label>
        <input class="form-input" type="number" id="descuento" placeholder="0.00" min="0" step="0.01" inputmode="decimal" oninput="recalcularTotal()">
      </div>

      <div id="resumenItems"></div>
      <div class="resumen-total">
        <span>Total</span>
        <span id="resumenTotal" style="color:var(--primary);">S/ 0.00</span>
      </div>

      <div id="errCobro" style="color:var(--danger);font-size:13px;margin:8px 0;display:none;"></div>

      <button class="btn btn-success mt-12" id="btnCobrar" onclick="confirmarVenta()">
        <i class="ti ti-check" aria-hidden="true"></i>
        <span id="btnCobrarTxt">Cobrar</span>
      </button>
      <button class="btn btn-secondary mt-8" onclick="cerrarModal('modalCobro')">Cancelar</button>
    </div>
  </div>

  <!-- MODAL: Boleta -->
  <div class="modal-overlay hidden" id="modalBoleta">
    <div class="modal">
      <div class="modal-handle"></div>
      <div id="boletaContenido"></div>
      <button class="btn-wsp" id="btnWsp" onclick="enviarWhatsApp()" style="display:none;">
        <i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Enviar por WhatsApp
      </button>
      <button class="btn btn-primary" onclick="descargarPDF()">
        <i class="ti ti-file-download" aria-hidden="true"></i> Descargar / Compartir PDF
      </button>
      <button class="btn btn-secondary mt-8" onclick="nuevaVenta()">
        <i class="ti ti-plus" aria-hidden="true"></i> Nueva venta
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { requireAuth } from '../js/auth.js'
    import { initNav } from '../js/nav.js'
    import { getProductos } from '../js/productos.js'
    import { crearVenta } from '../js/ventas.js'
    

    let productos    = []
    let carrito      = []
    let carritoOpen  = true
    let ventaActual  = null
    let tipoPagoSel  = 'efectivo'
    let boletaData   = null

    async function init() {
      await requireAuth()
      await initNav('ventas')
      await cargarProductos()
    }

    async function cargarProductos(busqueda = '') {
      try { productos = await getProductos(busqueda); renderProductos() }
      catch (e) { mostrarToast('Error al cargar productos') }
    }

    function renderProductos() {
      const lista = document.getElementById('listaProductos')
      if (!productos.length) {
        lista.innerHTML = `<div class="empty-state"><i class="ti ti-package"></i><p>No se encontraron productos</p></div>`
        return
      }
      lista.innerHTML = productos.map(p => {
        const agotado = p.stock === 0
        return `<div class="prod-item" onclick="${agotado ? '' : `agregarAlCarrito('${p.id}')`}" style="${agotado ? 'opacity:0.5;pointer-events:none;' : ''}">
          <div class="prod-ico ${agotado ? 'agotado' : ''}"><i class="ti ti-${agotado ? 'ban' : 'package'}" aria-hidden="true"></i></div>
          <div class="prod-info">
            <div class="prod-info-nombre">${p.nombre}</div>
            <div class="prod-info-stock">${agotado ? 'Sin stock' : `${p.stock} disponibles`}</div>
          </div>
          <div class="prod-precio">S/ ${Number(p.precio).toFixed(2)}</div>
        </div>`
      }).join('')
    }

    window.agregarAlCarrito = function(id) {
      const prod = productos.find(p => p.id === id)
      if (!prod || prod.stock === 0) return
      const existe = carrito.find(i => i.producto_id === id)
      if (existe) {
        if (existe.cantidad >= prod.stock) { mostrarToast('No hay más stock disponible'); return }
        existe.cantidad++
      } else {
        carrito.push({ producto_id: prod.id, nombre: prod.nombre, precio_unitario: Number(prod.precio), costo_unitario: Number(prod.costo), cantidad: 1, stock_max: prod.stock })
      }
      renderCarrito()
      mostrarToast(`${prod.nombre} agregado`)
    }

    function renderCarrito() {
      const itemsEl  = document.getElementById('carritoItems')
      const footerEl = document.getElementById('carritoFooter')
      const countEl  = document.getElementById('carritoCount')
      const totalEl  = document.getElementById('totalMostrar')
      const total    = carrito.reduce((s, i) => s + i.precio_unitario * i.cantidad, 0)
      countEl.textContent = carrito.reduce((s, i) => s + i.cantidad, 0)
      if (!carrito.length) {
        itemsEl.innerHTML = `<div class="carrito-vacio">Sin productos aún — toca uno para agregar</div>`
        footerEl.style.display = 'none'; return
      }
      footerEl.style.display = 'block'
      totalEl.textContent = `S/ ${total.toFixed(2)}`
      itemsEl.innerHTML = carrito.map((item, idx) => `
        <div class="carrito-item">
          <div class="carrito-nombre">${item.nombre}</div>
          <div class="qty-ctrl">
            <div class="qty-btn" onclick="cambiarQty(${idx}, -1)">−</div>
            <div class="qty-num">${item.cantidad}</div>
            <div class="qty-btn" onclick="cambiarQty(${idx}, 1)">+</div>
          </div>
          <div class="item-subtotal">S/ ${(item.precio_unitario * item.cantidad).toFixed(2)}</div>
        </div>`).join('')
    }

    window.cambiarQty = function(idx, delta) {
      const item = carrito[idx]; if (!item) return
      const nueva = item.cantidad + delta
      if (nueva <= 0) carrito.splice(idx, 1)
      else if (nueva > item.stock_max) { mostrarToast('Sin más stock disponible'); return }
      else item.cantidad = nueva
      renderCarrito()
    }

    window.toggleCarrito = function() {
      carritoOpen = !carritoOpen
      document.getElementById('carritoBody').style.display    = carritoOpen ? 'flex' : 'none'
      document.getElementById('carritoBody').style.flexDirection = 'column'
      document.getElementById('carritoChevron').className = carritoOpen ? 'ti ti-chevron-down' : 'ti ti-chevron-up'
    }

    window.seleccionarPago = function(tipo) {
      tipoPagoSel = tipo
      document.getElementById('tabEfectivo').classList.toggle('active', tipo === 'efectivo')
      document.getElementById('tabYape').classList.toggle('active', tipo === 'yape')
    }

    window.abrirCobro = function() {
      if (!carrito.length) return
      document.getElementById('clienteNombre').value   = ''
      document.getElementById('clienteTelefono').value = ''
      document.getElementById('descuento').value       = ''
      document.getElementById('errCobro').style.display = 'none'
      tipoPagoSel = 'efectivo'
      seleccionarPago('efectivo')
      renderResumen()
      document.getElementById('modalCobro').classList.remove('hidden')
    }

    window.recalcularTotal = function() { renderResumen() }

    function renderResumen() {
      const descuento = parseFloat(document.getElementById('descuento').value) || 0
      const subtotal  = carrito.reduce((s, i) => s + i.precio_unitario * i.cantidad, 0)
      const total     = Math.max(0, subtotal - descuento)
      document.getElementById('resumenItems').innerHTML = carrito.map(i =>
        `<div class="resumen-item"><span>${i.nombre} × ${i.cantidad}</span><span>S/ ${(i.precio_unitario * i.cantidad).toFixed(2)}</span></div>`).join('')
      document.getElementById('resumenTotal').textContent = `S/ ${total.toFixed(2)}`
    }

    window.confirmarVenta = async function() {
      const cliente   = document.getElementById('clienteNombre').value.trim()
      const telefono  = document.getElementById('clienteTelefono').value.trim()
      const descuento = parseFloat(document.getElementById('descuento').value) || 0
      const btn       = document.getElementById('btnCobrar')
      const errEl     = document.getElementById('errCobro')
      btn.disabled = true
      document.getElementById('btnCobrarTxt').textContent = 'Procesando...'
      errEl.style.display = 'none'
      try {
        ventaActual = await crearVenta(cliente, carrito, descuento, tipoPagoSel, telefono ? `+51${telefono}` : '')
        boletaData  = { venta: ventaActual, cliente, telefono: telefono ? `+51${telefono}` : '', descuento, tipoPago: tipoPagoSel, items: [...carrito] }
        cerrarModal('modalCobro')
        mostrarBoleta()
        await cargarProductos()
      } catch (e) {
        errEl.textContent = 'Error al procesar la venta. Intenta de nuevo.'
        errEl.style.display = 'block'
        btn.disabled = false
        document.getElementById('btnCobrarTxt').textContent = 'Cobrar'
      }
    }

    function mostrarBoleta() {
      const { venta, cliente, telefono, descuento, tipoPago, items } = boletaData
      const subtotal = items.reduce((s, i) => s + i.precio_unitario * i.cantidad, 0)
      const total    = Math.max(0, subtotal - descuento)
      const fecha    = new Date().toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      const numero   = String(venta.numero).padStart(4, '0')
      const pagoLabel = tipoPago === 'yape' ? 'Yape' : 'Efectivo'
      const pagoEmoji = tipoPago === 'yape' ? '📱' : '💵'

      const itemsHTML = items.map(i => `
        <div class="boleta-item-row">
          <span>${i.nombre}</span>
          <span>S/ ${(i.precio_unitario * i.cantidad).toFixed(2)}</span>
        </div>
        <div class="boleta-item-det">${i.cantidad} × S/ ${i.precio_unitario.toFixed(2)}</div>`).join('')

      document.getElementById('boletaContenido').innerHTML = `
        <div class="boleta-preview" id="boletaPreview">
          <div class="boleta-header">
            <div class="boleta-tienda">MI TIENDA</div>
            <div class="boleta-subtitulo">Tienda de Útiles Escolares</div>
          </div>
          <hr class="boleta-sep">
          <div class="boleta-meta">
            <div class="boleta-meta-row"><span>Boleta N°:</span><span><b>${numero}</b></span></div>
            <div class="boleta-meta-row"><span>Fecha:</span><span>${fecha}</span></div>
            <div class="boleta-meta-row"><span>Cliente:</span><span>${cliente || 'Cliente general'}</span></div>
          </div>
          <hr class="boleta-sep">
          <div class="boleta-items">${itemsHTML}</div>
          <hr class="boleta-sep">
          <div class="boleta-totales">
            ${descuento > 0 ? `<div class="boleta-total-row"><span>Subtotal</span><span>S/ ${subtotal.toFixed(2)}</span></div><div class="boleta-total-row"><span>Descuento</span><span>- S/ ${descuento.toFixed(2)}</span></div>` : ''}
            <div class="boleta-total-final"><span>TOTAL</span><span>S/ ${total.toFixed(2)}</span></div>
          </div>
          <div class="boleta-pago">
            <span class="boleta-pago-badge ${tipoPago}">${pagoEmoji} Pago: ${pagoLabel}</span>
          </div>
          <hr class="boleta-sep">
          <div class="boleta-gracias">¡Gracias por su compra!</div>
        </div>`

      // Mostrar botón WhatsApp si hay teléfono
      const btnWsp = document.getElementById('btnWsp')
      btnWsp.style.display = telefono ? 'flex' : 'none'

      document.getElementById('modalBoleta').classList.remove('hidden')
    }

    window.enviarWhatsApp = function() {
      const { venta, cliente, telefono, descuento, tipoPago, items } = boletaData
      const subtotal = items.reduce((s, i) => s + i.precio_unitario * i.cantidad, 0)
      const total    = Math.max(0, subtotal - descuento)
      const numero   = String(venta.numero).padStart(4, '0')
      const fecha    = new Date().toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      const pagoLabel = tipoPago === 'yape' ? 'Yape 📱' : 'Efectivo 💵'

      const lineas = items.map(i => `• ${i.nombre} ×${i.cantidad} = S/ ${(i.precio_unitario * i.cantidad).toFixed(2)}`).join('\n')

      const msg = `🧾 *BOLETA N° ${numero}*\n📅 ${fecha}\n👤 ${cliente || 'Cliente general'}\n\n${lineas}\n${descuento > 0 ? `\nDescuento: -S/ ${descuento.toFixed(2)}` : ''}\n\n*TOTAL: S/ ${total.toFixed(2)}*\n💳 Pago: ${pagoLabel}\n\n_Mi Tienda — Útiles Escolares_\n¡Gracias por su compra! 🙏`

      const telLimpio = boletaData.telefono.replace(/\D/g, '')
      window.open(`https://wa.me/${telLimpio}?text=${encodeURIComponent(msg)}`, '_blank')
    }

    window.descargarPDF = function() {
      const { jsPDF } = window.jspdf
      const doc = new jsPDF({ unit: 'mm', format: [80, 160], orientation: 'portrait' })
      const { venta, cliente, telefono, descuento, tipoPago, items } = boletaData
      const subtotal  = items.reduce((s, i) => s + i.precio_unitario * i.cantidad, 0)
      const total     = Math.max(0, subtotal - descuento)
      const numero    = String(venta.numero).padStart(4, '0')
      const fecha     = new Date().toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      const pagoLabel = tipoPago === 'yape' ? 'Yape' : 'Efectivo'

      let y = 10
      const cx = 40 // centro

      // Título
      doc.setFont('courier', 'bold')
      doc.setFontSize(14)
      doc.text('MI TIENDA', cx, y, { align: 'center' }); y += 5
      doc.setFont('courier', 'normal')
      doc.setFontSize(8)
      doc.text('Tienda de Utiles Escolares', cx, y, { align: 'center' }); y += 6

      // Línea
      doc.setLineDashPattern([1, 1], 0)
      doc.line(5, y, 75, y); y += 5

      // Meta
      doc.setFontSize(9)
      doc.text(`Boleta N°: ${numero}`, 5, y); y += 4
      doc.text(`Fecha: ${fecha}`, 5, y); y += 4
      doc.text(`Cliente: ${cliente || 'Cliente general'}`, 5, y); y += 4
      doc.text(`Pago: ${pagoLabel}`, 5, y); y += 5

      doc.line(5, y, 75, y); y += 5

      // Ítems
      doc.setFont('courier', 'bold')
      doc.setFontSize(8)
      doc.text('Producto', 5, y)
      doc.text('Total', 75, y, { align: 'right' }); y += 4
      doc.setFont('courier', 'normal')

      items.forEach(i => {
        const sub = (i.precio_unitario * i.cantidad).toFixed(2)
        // Nombre puede ser largo — truncar a 28 chars
        const nombre = i.nombre.length > 28 ? i.nombre.substring(0, 26) + '..' : i.nombre
        doc.text(nombre, 5, y)
        doc.text(`S/ ${sub}`, 75, y, { align: 'right' }); y += 4
        doc.setTextColor(120)
        doc.text(`  ${i.cantidad} x S/ ${i.precio_unitario.toFixed(2)}`, 5, y); y += 4
        doc.setTextColor(0)
      })

      doc.line(5, y, 75, y); y += 5

      // Totales
      if (descuento > 0) {
        doc.text(`Subtotal:`, 5, y)
        doc.text(`S/ ${subtotal.toFixed(2)}`, 75, y, { align: 'right' }); y += 4
        doc.text(`Descuento:`, 5, y)
        doc.text(`-S/ ${descuento.toFixed(2)}`, 75, y, { align: 'right' }); y += 4
      }

      doc.setFont('courier', 'bold')
      doc.setFontSize(11)
      doc.text('TOTAL:', 5, y)
      doc.text(`S/ ${total.toFixed(2)}`, 75, y, { align: 'right' }); y += 6

      doc.line(5, y, 75, y); y += 5

      doc.setFont('courier', 'normal')
      doc.setFontSize(8)
      doc.text('¡Gracias por su compra!', cx, y, { align: 'center' })

      // Compartir o descargar
      const pdfBlob = doc.output('blob')
      const pdfUrl  = URL.createObjectURL(pdfBlob)

      if (navigator.share && navigator.canShare) {
        const file = new File([pdfBlob], `boleta-${numero}.pdf`, { type: 'application/pdf' })
        if (navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: `Boleta N° ${numero}` })
          return
        }
      }
      // Fallback: descargar
      const a = document.createElement('a')
      a.href = pdfUrl
      a.download = `boleta-${numero}.pdf`
      a.click()
    }

    window.nuevaVenta = function() {
      carrito = []; ventaActual = null; boletaData = null
      renderCarrito(); cerrarModal('modalBoleta')
      document.getElementById('buscador').value = ''
      cargarProductos()
    }

    window.cerrarModal = id => document.getElementById(id).classList.add('hidden')

    let busqTimer
    document.getElementById('buscador').addEventListener('input', e => {
      clearTimeout(busqTimer)
      busqTimer = setTimeout(() => cargarProductos(e.target.value), 350)
    })

    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden') })
    })

    function mostrarToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg; t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2000)
    }

    init()
  </script>
  <script src="../js/router.js"></script>
</body>
</html>
