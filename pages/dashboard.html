<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Inicio — Tienda Útiles</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    .greeting { font-size: 13px; color: rgba(255,255,255,0.5); }
    .header-title { font-size: 17px; color: var(--white); font-weight: 600; }
    .venta-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
    .venta-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .venta-icon.cot { background: var(--warning-light); color: var(--warning); }
    .venta-nombre { font-size: 14px; font-weight: 500; color: var(--gray-800); }
    .venta-sub { font-size: 12px; color: var(--gray-400); margin-top: 1px; }
    .venta-monto { font-size: 14px; font-weight: 700; color: var(--primary); margin-left: auto; flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="app-header">
    <div>
      <div class="greeting">Bienvenido</div>
      <div class="header-title">Mi Tienda</div>
    </div>
    <button class="icon-btn" onclick="handleLogout()" aria-label="Cerrar sesión">
      <i class="ti ti-logout" aria-hidden="true"></i>
    </button>
  </header>

  <main class="page-content">

    <div class="section-title">Resumen de hoy</div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Ventas</div>
        <div class="metric-value green" id="totalVentas">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Órdenes</div>
        <div class="metric-value purple" id="numOrdenes">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ganancia</div>
        <div class="metric-value green" id="totalGanancia">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Cotizaciones</div>
        <div class="metric-value" id="numCotizaciones">—</div>
      </div>
    </div>

    <div class="section-title">Últimas ventas</div>
    <div id="listaVentas">
      <div style="text-align:center;padding:24px;"><div class="spinner"></div></div>
    </div>

    <div class="section-title">Stock bajo</div>
    <div id="stockBajo">
      <div style="text-align:center;padding:24px;"><div class="spinner"></div></div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <i class="ti ti-home" aria-hidden="true"></i>Inicio
    </a>
    <a href="ventas.html" class="nav-item">
      <i class="ti ti-shopping-cart" aria-hidden="true"></i>Venta
    </a>
    <a href="inventario.html" class="nav-item">
      <i class="ti ti-package" aria-hidden="true"></i>Inventario
    </a>
    <a href="cotizaciones.html" class="nav-item">
      <i class="ti ti-file-text" aria-hidden="true"></i>Cotizar
    </a>
  </nav>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    window.handleLogout = async () => {
      if (confirm('¿Cerrar sesión?')) await logout()
    }

    async function init() {
      const session = await requireAuth()
      if (!session) return

      const hoy = new Date()
      hoy.setHours(0, 0, 0, 0)
      const manana = new Date(hoy)
      manana.setDate(manana.getDate() + 1)

      const [ventasRes, cotRes, stockRes] = await Promise.all([
        supabase.from('ventas')
          .select('id, total, cliente, creado_en, detalle_ventas(costo_unitario, cantidad)')
          .gte('creado_en', hoy.toISOString())
          .lt('creado_en', manana.toISOString())
          .order('creado_en', { ascending: false }),
        supabase.from('cotizaciones')
          .select('id', { count: 'exact' })
          .gte('creado_en', hoy.toISOString())
          .lt('creado_en', manana.toISOString()),
        supabase.from('productos')
          .select('nombre, stock, stock_min')
          .filter('activo', 'eq', true)
      ])

      const ventas = ventasRes.data || []
      const totalVentas = ventas.reduce((s, v) => s + Number(v.total), 0)
      const totalGanancia = ventas.reduce((s, v) => {
        const costo = (v.detalle_ventas || []).reduce((sc, d) => sc + Number(d.costo_unitario) * d.cantidad, 0)
        return s + (Number(v.total) - costo)
      }, 0)

      document.getElementById('totalVentas').textContent    = `S/ ${totalVentas.toFixed(2)}`
      document.getElementById('numOrdenes').textContent     = ventas.length
      document.getElementById('totalGanancia').textContent  = `S/ ${totalGanancia.toFixed(2)}`
      document.getElementById('numCotizaciones').textContent = cotRes.count ?? 0

      const listaEl = document.getElementById('listaVentas')
      if (ventas.length === 0) {
        listaEl.innerHTML = `<div class="empty-state"><i class="ti ti-receipt"></i><p>Sin ventas hoy todavía</p></div>`
      } else {
        listaEl.innerHTML = ventas.slice(0, 5).map(v => {
          const hora = new Date(v.creado_en).toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' })
          return `
            <div class="venta-row">
              <div class="venta-icon"><i class="ti ti-receipt" aria-hidden="true"></i></div>
              <div>
                <div class="venta-nombre">${v.cliente || 'Cliente general'}</div>
                <div class="venta-sub">${hora}</div>
              </div>
              <div class="venta-monto">S/ ${Number(v.total).toFixed(2)}</div>
            </div>`
        }).join('')
      }

      const stockEl = document.getElementById('stockBajo')
      const bajos = (stockRes.data || []).filter(p => p.stock <= p.stock_min)
      if (bajos.length === 0) {
        stockEl.innerHTML = `<div class="card-flat" style="color:var(--success);font-size:13px;display:flex;align-items:center;gap:8px;"><i class="ti ti-circle-check" style="font-size:18px;" aria-hidden="true"></i> Todo el stock está bien</div>`
      } else {
        stockEl.innerHTML = bajos.map(p => `
          <div class="card-flat row-between">
            <span style="font-size:14px;font-weight:500;">${p.nombre}</span>
            <span class="badge badge-amber">${p.stock} unid.</span>
          </div>`).join('')
      }
    }

    init()
  </script>

</body>
</html>
