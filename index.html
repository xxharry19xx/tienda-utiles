<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Iniciar sesión — Tienda Útiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    body {
      background: var(--gray-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 380px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-light);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 32px;
      color: var(--primary);
    }
    .logo-wrap h1 {
      font-size: 20px;
      color: var(--gray-900);
      margin-bottom: 4px;
    }
    .logo-wrap p {
      font-size: 13px;
      color: var(--gray-400);
    }
    .error-msg {
      background: var(--danger-light);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .footer-text {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo-wrap">
      <div class="logo-icon">
        <i class="ti ti-shopping-bag" aria-hidden="true"></i>
      </div>
      <h1>Mi Tienda</h1>
      <p>Sistema de ventas</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="ti ti-alert-circle" aria-hidden="true"></i>
      <span id="errorText">Correo o contraseña incorrectos</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Correo</label>
      <input
        class="form-input"
        type="email"
        id="email"
        placeholder="tu@correo.com"
        autocomplete="email"
        inputmode="email"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div style="position:relative;">
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
          style="padding-right: 44px;"
        >
        <button
          type="button"
          id="togglePass"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);font-size:20px;cursor:pointer;padding:0;"
          aria-label="Mostrar contraseña"
        >
          <i class="ti ti-eye" id="eyeIcon" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-primary mt-12" id="loginBtn" onclick="handleLogin()">
      <span id="btnText">Ingresar</span>
      <div class="spinner" id="btnSpinner" style="display:none;width:18px;height:18px;border-width:2px;"></div>
    </button>
  </div>

  <p class="footer-text">Tienda Útiles v1.0</p>

  <script type="module">
    import { login, getSession } from './js/auth.js'

    async function checkSession() {
      const session = await getSession()
      if (session) window.location.href = './pages/dashboard.html'
    }
    checkSession()

    const togglePass = document.getElementById('togglePass')
    const passInput  = document.getElementById('password')
    const eyeIcon    = document.getElementById('eyeIcon')

    togglePass.addEventListener('click', () => {
      const isPass = passInput.type === 'password'
      passInput.type = isPass ? 'text' : 'password'
      eyeIcon.className = isPass ? 'ti ti-eye-off' : 'ti ti-eye'
    })

    passInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin()
    })

    window.handleLogin = async function() {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('loginBtn')
      const btnText  = document.getElementById('btnText')
      const spinner  = document.getElementById('btnSpinner')
      const errorMsg = document.getElementById('errorMsg')
      const errorTxt = document.getElementById('errorText')

      if (!email || !password) {
        errorTxt.textContent = 'Ingresa tu correo y contraseña'
        errorMsg.classList.add('show')
        return
      }

      btn.disabled = true
      btnText.style.display = 'none'
      spinner.style.display = 'block'
      errorMsg.classList.remove('show')

      try {
        await login(email, password)
        window.location.href = './pages/dashboard.html'
      } catch (err) {
        errorTxt.textContent = 'Correo o contraseña incorrectos'
        errorMsg.classList.add('show')
        btn.disabled = false
        btnText.style.display = 'block'
        spinner.style.display = 'none'
      }
    }
  </script>

  <script src="js/router.js"></script>
</body>
</html>
